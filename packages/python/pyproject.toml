[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[project]
name = "wlearn-bo"
version = "0.1.0"
description = "Bayesian optimization with Gaussian processes for hyperparameter tuning"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.9"
dependencies = ["numpy"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "Operating System :: POSIX :: Linux",
    "Programming Language :: C",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
keywords = ["bayesian-optimization", "gaussian-process", "hyperparameter-tuning", "automl", "wlearn"]

[project.urls]
Homepage = "https://github.com/wlearn-org/wlearn"
Repository = "https://github.com/wlearn-org/wlearn"
Issues = "https://github.com/wlearn-org/wlearn/issues"

[tool.setuptools.packages.find]
include = ["wlearn_bo*"]

[tool.setuptools.package-data]
wlearn_bo = ["_native.c"]
